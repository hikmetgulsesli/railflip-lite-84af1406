<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Settings - RailFlip Lite</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Sora:wght@400;600;700;800&amp;family=Space+Grotesk:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Range Slider Styling to hide default and use our track underneath */
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            margin-top: -8px; 
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#d8e2ff",
                        "on-secondary": "#5b005b",
                        "on-primary-container": "#006a71",
                        "outline-variant": "#3a494b",
                        "on-primary-fixed": "#002022",
                        "background": "#0d1515",
                        "on-tertiary-fixed": "#001a42",
                        "inverse-on-surface": "#2a3232",
                        "on-secondary-fixed-variant": "#810081",
                        "primary-container": "#00f2ff",
                        "surface-container-low": "#151d1e",
                        "secondary-fixed": "#ffd7f5",
                        "primary-fixed": "#74f5ff",
                        "primary-fixed-dim": "#00dbe7",
                        "primary": "#e1fdff",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#004f54",
                        "outline": "#849495",
                        "on-secondary-fixed": "#380038",
                        "surface-bright": "#333b3b",
                        "inverse-primary": "#00696f",
                        "on-primary": "#00363a",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface": "#0d1515",
                        "surface-container-highest": "#2e3637",
                        "surface-container-lowest": "#080f10",
                        "on-tertiary-fixed-variant": "#004395",
                        "surface-container-high": "#232b2c",
                        "on-error": "#690005",
                        "secondary-container": "#fe00fe",
                        "surface-container": "#192122",
                        "tertiary-container": "#cddbff",
                        "inverse-surface": "#dce4e4",
                        "secondary": "#ffabf3",
                        "on-background": "#dce4e4",
                        "surface-dim": "#0d1515",
                        "tertiary": "#f7f7ff",
                        "on-surface-variant": "#b9cacb",
                        "secondary-fixed-dim": "#ffabf3",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#dce4e4",
                        "on-tertiary-container": "#005cc5",
                        "on-secondary-container": "#500050",
                        "surface-variant": "#2e3637",
                        "surface-tint": "#00dbe7",
                        "error": "#ffb4ab",
                        "on-tertiary": "#002e6a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "sm": "8px",
                        "xl": "40px",
                        "gutter": "12px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "display-lg": ["Sora", "sans-serif"],
                        "body-sm": ["Space Grotesk", "sans-serif"],
                        "hud-label": ["JetBrains Mono", "monospace"],
                        "button-text": ["Sora", "sans-serif"],
                        "display-lg-mobile": ["Sora", "sans-serif"],
                        "headline-md": ["Sora", "sans-serif"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "hud-label": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Gameplay Simulation (Blurred) -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A high-velocity, synthwave-inspired arcade racing track extending into the distance under a dark, starlit digital sky. The track consists of glowing electric cyan and neon magenta grid lines that pulse with energy. The lighting is highly stylized, with deep black voids contrasting sharply against the vibrant, saturated neon glows. The overall mood is intense, nocturnal, and technologically precise, capturing a retro-futuristic arcade aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDutKvqtNYXGOqaLO4O7aurUe9xVSYuCj2_tOI8v8oKFWB1VJXnQloZR4CnN86LlntYYQXF2kQp-CJGMOB5SL5h44gyO9z1PhGPrGXlHR8mbskWYnL5EreFk375yq0FnmkTQx86HHLL3ZV_kf8l0MOpkaDNkZt4IMU1rpM5r0IQxTBfMAgBEZeZ3Qc8iYfHTpqVQZhchEoU12yIEsUOqiTV7pBO4yrYgunCP0MlG8wfAU0nJFZ14qhg6fhGpSa0h5BiGJCexUagssg');">
<div class="absolute inset-0 bg-background/80 backdrop-blur-[6px]"></div>
</div>
<!-- Main Settings Overlay Canvas -->
<main class="relative z-10 w-full max-w-[420px] mx-margin-mobile">
<!-- Glassmorphic Card -->
<div class="bg-surface-container/60 backdrop-blur-2xl border border-white/10 rounded-[1.5rem] p-lg shadow-[0_0_40px_rgba(0,242,255,0.08)] overflow-hidden relative">
<!-- Top Edge Glow -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<!-- Header -->
<header class="flex items-center justify-between mb-xl pb-sm border-b border-white/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container drop-shadow-[0_0_8px_rgba(0,242,255,0.6)] text-[28px]" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">CONFIG</h1>
</div>
</header>
<!-- Difficulty Section -->
<section class="mb-lg">
<label class="block font-hud-label text-hud-label text-on-surface-variant mb-md opacity-80">DIFFICULTY</label>
<div class="flex bg-surface-container-highest rounded-xl p-unit border border-white/5 relative shadow-inner">
<!-- Active Indicator (Set to MEDIUM for mockup) -->
<div class="absolute left-unit top-unit bottom-unit w-[calc(33.33%-2.66px)] bg-primary-container rounded-lg shadow-[0_0_12px_rgba(0,242,255,0.4)] transition-transform duration-300 transform translate-x-full z-0"></div>
<button class="flex-1 relative z-10 py-sm font-button-text text-button-text text-on-surface-variant hover:text-on-surface transition-colors text-center text-[13px] uppercase tracking-wider" type="button">
                        EASY
                    </button>
<button class="flex-1 relative z-10 py-sm font-button-text text-button-text text-on-primary-fixed transition-colors text-center text-[13px] uppercase tracking-wider font-bold" type="button">
                        MEDIUM
                    </button>
<button class="flex-1 relative z-10 py-sm font-button-text text-button-text text-on-surface-variant hover:text-on-surface transition-colors text-center text-[13px] uppercase tracking-wider" type="button">
                        HARD
                    </button>
</div>
</section>
<!-- Speed Slider Section -->
<section class="mb-xl">
<div class="flex justify-between items-end mb-md">
<label class="block font-hud-label text-hud-label text-on-surface-variant opacity-80">SPEED MULTIPLIER</label>
<span class="font-hud-label text-hud-label text-primary-container drop-shadow-[0_0_5px_rgba(0,242,255,0.5)]">1.5x</span>
</div>
<div class="relative w-full h-[12px] bg-surface-container-highest rounded-full border border-white/5 shadow-inner flex items-center">
<!-- Styled Track Fill -->
<div class="absolute left-0 h-[4px] ml-1 w-[60%] bg-gradient-to-r from-secondary-container to-primary-container shadow-[0_0_10px_rgba(0,242,255,0.6)] rounded-full z-0 pointer-events-none"></div>
<!-- Styled Thumb (Lead Pixel) -->
<div class="absolute left-[60%] w-4 h-4 bg-white rounded-full shadow-[0_0_10px_#ffffff] -ml-2 z-10 pointer-events-none border-[3px] border-surface"></div>
<!-- Invisible Native Input for interaction -->
<input class="w-full absolute z-20 h-full opacity-0 cursor-pointer" max="20" min="10" type="range" value="15"/>
</div>
<div class="flex justify-between mt-2 px-1">
<span class="font-hud-label text-[10px] text-on-surface-variant opacity-40">1.0x</span>
<span class="font-hud-label text-[10px] text-on-surface-variant opacity-40">2.0x</span>
</div>
</section>
<!-- Input Help Panel -->
<section class="mb-xl bg-surface-container-high/50 p-md rounded-xl border border-white/5 flex items-start gap-md">
<span class="material-symbols-outlined text-secondary-container text-[20px] mt-0.5 opacity-90 drop-shadow-[0_0_5px_rgba(254,0,254,0.4)]" data-icon="keyboard">keyboard</span>
<div>
<p class="font-hud-label text-hud-label text-on-surface mb-unit">INPUT HELP</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Click / Space to Flip.</p>
</div>
</section>
<!-- Action Area -->
<footer class="pt-md border-t border-white/5 flex flex-col gap-sm">
<!-- Primary Action -->
<button class="w-full py-3 bg-primary-container text-on-primary-fixed font-button-text text-button-text rounded-xl hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(0,242,255,0.4)] transition-all uppercase tracking-widest font-extrabold relative overflow-hidden group" type="button">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
<span class="relative z-10">SAVE PREFERENCES</span>
</button>
<div class="flex gap-sm w-full">
<!-- Secondary Action -->
<button class="flex-1 py-3 bg-surface-container-high border border-white/10 text-on-surface font-button-text text-button-text rounded-xl hover:bg-surface-variant hover:text-white transition-colors text-[14px] uppercase tracking-wider" type="button">
                        BACK TO GAME
                    </button>
<!-- Reset Action -->
<button class="w-[52px] flex items-center justify-center bg-transparent border border-error/20 text-error rounded-xl hover:bg-error/10 hover:border-error/40 transition-colors group" title="Reset to Defaults" type="button">
<span class="material-symbols-outlined text-[20px] group-hover:-rotate-180 transition-transform duration-500" data-icon="refresh">refresh</span>
</button>
</div>
</footer>
</div>
</main>
</body></html>
